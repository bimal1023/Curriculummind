services:
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_PORT: 8000
    env_file:
      - ../../.env
    volumes:
      - ../../:/app   # hot reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
